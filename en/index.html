<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BetaSuite</title>
  <meta name="description" content="BetaSuite — a compact mobile toolkit for testers: capture, annotate, diagnose, and report.">
  <link rel="icon" href="../icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>

<body>
  <a class="skip-link" href="#main" style="position:absolute;left:-999px;top:auto;width:1px;height:1px;overflow:hidden">Skip to content</a>

  <header class="site-header" role="banner">
    <nav class="nav container" role="navigation" aria-label="Main navigation">
      <a class="brand" href="./index.html" aria-label="BetaSuite home">
        <img src="../icon.png" alt="BetaSuite logo" class="brand-mark" width="36" height="36">
        <span class="brand-name">BetaSuite</span>
      </a>

      <button id="nav-toggle" class="nav-toggle" aria-expanded="false" aria-controls="nav-links" aria-label="Toggle menu">
        ☰
      </button>

      <div id="nav-links" class="nav-links" role="menu">
        <a role="menuitem" href="./index.html" data-i18n="navHome">Home</a>
        <a role="menuitem" href="./support.html" data-i18n="navSupport">Support</a>

        <select id="language-picker" class="language-picker" aria-label="Language selector" title="Select language">
          <option value="en">🇬🇧 English</option>
          <option value="zh">🇨🇳 中文</option>
        </select>
      </div>
    </nav>
  </header>

  <main id="main" class="container" tabindex="-1">
    <section class="hero" aria-labelledby="hero-title">
      <h1 id="hero-title" data-i18n="heroTitle">Beta testing, all in one app.</h1>
      <p class="lead" data-i18n="heroText">BetaSuite is a mobile toolkit for testers.</p>
    </section>
  </main>

  <footer class="site-footer container" role="contentinfo" aria-label="Footer">
    <div class="footer-links">
      <a href="./index.html">Home</a>
      <a href="./support.html">Support</a>
    </div>
    <p class="small-muted">© 2026 BetaSuite</p>
  </footer>

  <!-- Router (if used) and small UI helpers -->
  <script src="../router.js" defer></script>

  <!-- Small nav toggle helper (keeps behavior local and simple) -->
  <script>
    (function () {
      const toggle = document.getElementById('nav-toggle');
      const links = document.getElementById('nav-links');

      if (!toggle || !links) return;

      toggle.addEventListener('click', () => {
        const expanded = toggle.getAttribute('aria-expanded') === 'true';
        toggle.setAttribute('aria-expanded', String(!expanded));
        links.classList.toggle('open');
        // move focus to first link when opening for keyboard users
        if (!expanded) {
          const first = links.querySelector('a, button, [role="menuitem"], select');
          if (first) first.focus();
        } else {
          toggle.focus();
        }
      });

      // Close menu on Escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && links.classList.contains('open')) {
          links.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
          toggle.focus();
        }
      });

      // Close menu when clicking outside (mobile)
      document.addEventListener('click', (e) => {
        if (!links.classList.contains('open')) return;
        if (!links.contains(e.target) && !toggle.contains(e.target)) {
          links.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
        }
      });
    })();
  </script>

  <script src="../translations.js" defer></script>
</body>
</html>
