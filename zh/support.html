<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>支持 — BetaSuite</title>
  <meta name="description" content="联系 BetaSuite 支持 — 我们通常在 2 个工作日内回复。">
  <link rel="icon" type="image/png" href="../icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>

<body>
  <a class="skip-link" href="#main" style="position:absolute;left:-999px;top:auto;width:1px;height:1px;overflow:hidden">跳到内容</a>

  <header class="site-header" role="banner">
    <nav class="nav container" role="navigation" aria-label="主导航">
      <a class="brand" href="./index.html" aria-label="BetaSuite 主页">
        <img src="../icon.png" alt="BetaSuite 徽标" class="brand-mark" width="36" height="36">
        <span class="brand-name">BetaSuite</span>
      </a>

      <button id="nav-toggle" class="nav-toggle" aria-expanded="false" aria-controls="nav-links" aria-label="切换菜单">☰</button>

      <div id="nav-links" class="nav-links" role="menu">
        <a role="menuitem" href="./index.html" data-i18n="navHome">主页</a>
        <a role="menuitem" href="./support.html" data-i18n="navSupport">支持</a>
        <a role="menuitem" href="./privacy.html" data-i18n="navPrivacy">隐私</a>
        <a role="menuitem" href="./terms.html" data-i18n="navTerms">条款</a>

        <select id="language-picker" class="language-picker" aria-label="语言选择" title="选择语言">
          <option value="en">🇬🇧 English</option>
          <option value="zh">🇨🇳 中文</option>
        </select>
      </div>
    </nav>
  </header>

  <main id="main" class="container" tabindex="-1">
    <section class="hero" aria-labelledby="support-title">
      <h1 id="support-title" data-i18n="supportTitle">支持</h1>
      <p class="lede" data-i18n="supportLede">我们会在 2 个工作日内回复。</p>
    </section>

    <section class="contact-block" aria-labelledby="contact-title">
      <h2 id="contact-title" data-i18n="contactTitle">联系我们</h2>

      <p>
        邮箱：
        <a href="mailto:betasuiteau@gmail.com">betasuiteau@gmail.com</a>
      </p>

      <form class="contact-form" id="contact-form" novalidate>
        <div>
          <label for="name" data-i18n="nameLabel">姓名</label>
          <input id="name" type="text" name="name" required data-i18n-placeholder="nameLabel" placeholder="姓名">
        </div>

        <div>
          <label for="email" data-i18n="emailLabel">邮箱地址</label>
          <input id="email" type="email" name="email" required data-i18n-placeholder="emailLabel" placeholder="you@example.com">
        </div>

        <div>
          <label for="category" data-i18n="categoryLabel">类别</label>
          <select id="category" name="category" aria-label="类别">
            <option>错误报告</option>
            <option>功能建议</option>
            <option>一般咨询</option>
            <option>账单问题</option>
            <option>其他</option>
          </select>
        </div>

        <div>
          <label for="message" data-i18n="messageLabel">信息</label>
          <textarea id="message" name="message" required minlength="10" rows="6" data-i18n-placeholder="messageLabel" placeholder="请描述您的问题或建议"></textarea>
        </div>

        <div>
          <button type="submit" class="btn" data-i18n-value="sendMessage">发送</button>
        </div>

        <p id="form-status" class="small-muted" aria-live="polite" style="margin-top:12px;"></p>
      </form>
    </section>

    <section aria-labelledby="faq-title" style="margin-top:28px;">
      <h2 id="faq-title" data-i18n="faqTitle">常见问题</h2>

      <dl class="faq">
        <dt>支持哪些设备？</dt>
        <dd>主要支持 iPhone（iOS 16+），也支持 Android。</dd>

        <dt>需要账号吗？</dt>
        <dd>不需要账号。</dd>

        <dt>如何删除数据？</dt>
        <dd>设置 → 数据 → 清除所有数据。</dd>

        <dt>什么是隐私模式？</dt>
        <dd>尽可能在本地处理数据，不上传云端。</dd>
      </dl>
    </section>
  </main>

  <footer class="site-footer container" role="contentinfo" aria-label="页脚">
    <div class="footer-links">
      <a href="./index.html">主页</a>
      <a href="./support.html">支持</a>
      <a href="./privacy.html">隐私</a>
      <a href="./terms.html">条款</a>
    </div>
    <p class="small-muted">© 2026 BetaSuite</p>
  </footer>

  <script src="../router.js" defer></script>

  <script>
    (function () {
      const toggle = document.getElementById('nav-toggle');
      const links = document.getElementById('nav-links');

      if (toggle && links) {
        toggle.addEventListener('click', () => {
          const expanded = toggle.getAttribute('aria-expanded') === 'true';
          toggle.setAttribute('aria-expanded', String(!expanded));
          links.classList.toggle('open');
          if (!expanded) {
            const first = links.querySelector('a, button, [role="menuitem"], select');
            if (first) first.focus();
          } else {
            toggle.focus();
          }
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && links.classList.contains('open')) {
            links.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
            toggle.focus();
          }
        });

        document.addEventListener('click', (e) => {
          if (!links.classList.contains('open')) return;
          if (!links.contains(e.target) && !toggle.contains(e.target)) {
            links.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
          }
        });
      }

      // 表单处理：防止页面跳转，使用 mailto 回退并显示状态
      const form = document.getElementById('contact-form');
      const status = document.getElementById('form-status');
      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          status.textContent = '发送中…';
          const data = new FormData(form);
          if (!data.get('name') || !data.get('email') || !data.get('message')) {
            status.textContent = '请填写所有必填字段。';
            return;
          }
          const subject = encodeURIComponent('BetaSuite 支持请求');
          const body = encodeURIComponent(
            `姓名: ${data.get('name')}\n邮箱: ${data.get('email')}\n类别: ${data.get('category')}\n\n${data.get('message')}`
          );
          window.location.href = `mailto:betasuiteau@gmail.com?subject=${subject}&body=${body}`;
          status.textContent = '正在打开您的邮件客户端…';
        });
      }
    })();
  </script>

  <script src="../translations.js" defer></script>
</body>
</html>
