<?xml version="1.0" encoding="UTF-8"?>
<!--
  Apple "Download on the App Store" badge — hand-recreated to match
  Apple's official badge geometry (black rounded rect + Apple logo +
  two-line wordmark). Apple requires their badge when linking to the
  App Store from a webpage (per Marketing Resources guidelines), and
  permits use of the Apple logo for this purpose.

  When/if you want the canonical asset: Apple generates a per-locale
  badge SVG/PNG via the App Store Marketing Tools at
  https://tools.applemediaservices.com/app/6766279266 — pick your
  locale, download "Download on the App Store" badge in black, then
  overwrite this file at icons/app-store-badge.svg (markup unchanged).

  viewBox 240×80 ≈ 3 : 1 aspect ratio; text uses the system font
  stack so it renders in SF on Apple devices and a clean sans on
  every other platform. Colour follows currentColor on the fill via
  the white explicit fill (the badge is intentionally
  black-background-only — Apple discourages recolouring).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" role="img" aria-label="Download on the App Store">
  <rect width="240" height="80" rx="12" ry="12" fill="#000"/>
  <g transform="translate(20 23) scale(1.4)" fill="#fff">
    <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
  </g>
  <text x="68" y="33" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#fff" letter-spacing="0.2">Download on the</text>
  <text x="67.5" y="61" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="600" fill="#fff" letter-spacing="-0.5">App Store</text>
</svg>
